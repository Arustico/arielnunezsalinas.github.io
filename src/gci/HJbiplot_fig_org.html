                const filters = {"Pilar": ["1", "10", "11", "12", "2", "3", "4", "5", "6", "7", "8", "9"], "Year": ["2014", "2015", "2016", "2017", "2018", "2019"]};

                let selected = {};

                // Crear contenedor
                const container = document.createElement("div");
                container.style.marginBottom = "20px";

                // Crear dropdowns dinámicamente
                Object.keys(filters).forEach(col => {

                    selected[col] = null;

                    const label = document.createElement("label");
                    label.innerHTML = col + ": ";
                    label.style.marginRight = "8px";

                    const select = document.createElement("select");
                    select.style.marginRight = "20px";

                    const optAll = document.createElement("option");
                    optAll.value = "";
                    optAll.text = "Todos";
                    select.appendChild(optAll);

                    filters[col].forEach(val => {
                        const opt = document.createElement("option");
                        opt.value = val;
                        opt.text = val;
                        select.appendChild(opt);
                    });

                    select.addEventListener("change", function(e) {
                        selected[col] = e.target.value || null;
                        applyFilters();
                    });

                    container.appendChild(label);
                    container.appendChild(select);
                });

                graphDiv.parentNode.insertBefore(container, graphDiv);

                function applyFilters() {

                    const visibility = graphDiv.data.map((trace, i) => {

                        if (i < 3) return true;

                        if (!trace.meta) return true;

                        for (let key in selected) {
                           if (
                                selected[key] !== null &&
                                String(trace.meta[key]) !== selected[key]
                            ){
                                return false;
                            }
                        }

                        return true;
                    });

                    Plotly.restyle(graphDiv, { visible: visibility });
                }

            });
            
                        })                };            </script>        </div>
